{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>HR Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Poppins", sans-serif;
        }

        .chat-container {
            width: 420px;
            height: 600px;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .chat-header {
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 20px;
            margin: 8px 0;
            max-width: 75%;
            animation: fadeIn 0.3s ease;
        }
        .message {
          white-space: pre-wrap;  /* 🔥 fixes spacing + line breaks */
       }

        #micBtn {
        background: #28a745;
    }

       #micBtn:hover {
        background: #1e7e34;
      }

        .user {
            background: #0d6efd;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #ffffff;
            color: black;
        }

        .input-area {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            border-radius: 30px;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            border: none;
            background: #0d6efd;
            color: white;
            font-size: 18px;
        }

        button:hover {
            background: #023e8a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing {
            font-style: italic;
            color: white;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">💬 HR Assistant</div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">👋 Hi! Ask me about employees, salary, department or attendance.</div>
    </div>

    <div class="typing d-none" id="typing">🤖 Typing...</div>

    <form class="input-area" id="chatForm">
    {% csrf_token %}
    <input type="text" id="input" placeholder="Ask something..." required>

    <!-- 🎤 Voice -->
    <button type="button" id="micBtn">🎤</button>

    <!-- Send -->
   <button type="button" id="sendBtn">➤</button>
</form>
</div>
<script>
    const chatBox = document.getElementById("chatBox");
const input = document.getElementById("input");
const typing = document.getElementById("typing");
const micBtn = document.getElementById("micBtn");
const sendBtn = document.getElementById("sendBtn");

// =======================
// ADD MESSAGE
// =======================
function addMessage(message, type) {
    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerText = message;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// =======================
// SPEAK
// =======================
function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    speech.rate = 1;
    window.speechSynthesis.speak(speech);
}

// =======================
// SEND MESSAGE (MAIN)
// =======================
function sendMessage() {
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, "user");
    input.value = "";

    typing.innerText = "🤖 Thinking...";
    typing.classList.remove("d-none");

    fetch("{% url 'employee:chatbot' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: `question=${encodeURIComponent(question)}`
    })
    .then(res => res.json())
    .then(data => {
        typing.classList.add("d-none");

        const text = data.answer;
        speak(text);

        const botDiv = document.createElement("div");
        botDiv.classList.add("message", "bot");
        chatBox.appendChild(botDiv);

        let i = 0;
        botDiv.innerText = "";

        const interval = setInterval(() => {
            botDiv.innerText += text[i];
            i++;
            chatBox.scrollTop = chatBox.scrollHeight;

            if (i >= text.length) clearInterval(interval);
        }, 20);
    })
    .catch(() => {
        typing.classList.add("d-none");
        addMessage("❌ Error occurred", "bot");
    });
}

// =======================
// ENTER KEY (FINAL FIX)
// =======================
input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

// =======================
// BUTTON CLICK
// =======================
sendBtn.addEventListener("click", sendMessage);

// =======================
// VOICE INPUT (FIXED CLEAN)
// =======================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = "en-IN";

    micBtn.addEventListener("click", () => {
        recognition.start();
        micBtn.innerText = "🎧 Listening...";
    });

   recognition.onresult = function(event) {
    input.value = event.results[0][0].transcript;
    micBtn.innerText = "🎤";

    // 🔥 ADD THIS (IMPORTANT FIX)
    input.focus();
};

    recognition.onend = function() {
    micBtn.innerText = "🎤";

    // 🔥 ADD THIS (IMPORTANT FIX)
    input.focus();
};
} else {
    micBtn.style.display = "none";
}
</script>

</body>
</html>
